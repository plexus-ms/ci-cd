name: plexus-ci

# Reusable CI for Plexus apps.
# - Runs the contract verbs (check → test) for verification.
# - If `build` is `true`, builds and pushes a Docker image to GHCR.

on:
  workflow_call:
    inputs:
      app:
        description: Required. Workspace app name (the dir under `apps/`, e.g. `website`).
        required: true
        type: string
      build:
        description: Build and push an image (set to `true` for environment-branch pushes).
        required: false
        type: boolean
        default: false
      image-name:
        description: Image name under the tenant's GHCR org. Defaults to the value of `app`.
        required: false
        type: string
        default: ''
      dockerfile:
        description: Dockerfile path. Defaults to apps/<app>/docker/Dockerfile.
        required: false
        type: string
        default: ''
    outputs:
      image-ref:
        description: Full image ref that was built (name:sha).
        value: ${{ jobs.build.outputs.image-ref }}

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      # CI's contract with the repo is the single `verify` verb (§ 8.5 PLX) —
      # never the individual checks. The scope arg path-scopes verify to this
      # app plus its dependency packages (§ 8.2 PLX); the trailing `...` is
      # turbo's dependency-inclusive filter, applied inside the verb.
      - run: mise verify "apps/${{ inputs.app }}..."

  build:
    needs: verify
    if: ${{ inputs.build }}
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.meta.outputs.image-ref }}
    steps:
      - uses: actions/checkout@v7
      - run: echo "NODE_VERSION=$(cat .node-version)" >> "$GITHUB_ENV"
      - id: meta
        # Image lives under the CALLER's org so the repo's own GITHUB_TOKEN can
        # push it (no cross-org PAT). Tenant app → tenant-org registry.
        run: |
          name='${{ inputs.image-name }}'
          [ -n "$name" ] || name='${{ inputs.app }}'
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "image-ref=ghcr.io/$owner/$name:${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile != '' && inputs.dockerfile || format('apps/{0}/docker/Dockerfile', inputs.app) }}
          push: true
          tags: ${{ steps.meta.outputs.image-ref }}
          build-args: |
            APP=${{ inputs.app }}
            NODE_VERSION=${{ env.NODE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

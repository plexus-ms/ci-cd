name: deploy

# Reusable deploy for Plexus apps. Thin wrapper that mounts the stateless deploy
# verb (scripts/deploy.sh in this repo) on the push event; the tenant supplies
# the host + SSH key. Apps reference it after ci:
#
#   deploy:
#     needs: ci
#     if: github.ref == 'refs/heads/main'
#     uses: plexus-ms/ci-cd/.github/workflows/deploy.yml@0.25.0
#     with:
#       tenant: plexus
#       app: website
#       image-ref: ${{ needs.ci.outputs.image-ref }}
#       host: deploy@<your-host>
#     secrets:
#       ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}

on:
  workflow_call:
    inputs:
      tenant:
        description: Tenant id — first segment of the app dir (/opt/stacks/<tenant>/<app>).
        required: true
        type: string
      app:
        required: true
        type: string
      image-ref:
        description: Full image ref to deploy (name:tag), e.g. ci's output.
        required: true
        type: string
      host:
        description: SSH target, e.g. deploy@1.2.3.4.
        required: true
        type: string
      health-url:
        description: Healthcheck URL polled on the host. Defaults to /healthz on the app's platform.env port.
        required: false
        type: string
        default: ''
    secrets:
      ssh-key:
        description: Private key authorized as the deploy user on the host.
        required: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Serialize deploys per app+host: at most one running and one pending run
    # per group, and GitHub replaces the pending run with the newest — so the
    # newest commit always deploys last. Never cancels a mid-flight deploy
    # (cancelling between migrate and up would strand the host).
    concurrency:
      group: deploy-${{ inputs.tenant }}-${{ inputs.app }}-${{ inputs.host }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
        with:
          repository: plexus-ms/ci-cd
          ref: ${{ github.job_workflow_sha }}
      - name: Load SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          printf '%s\n' "${{ secrets.ssh-key }}" | ssh-add -
      - name: Deploy
        env:
          PLEXUS_HEALTH_URL: ${{ inputs.health-url }}
        run: bash scripts/deploy.sh '${{ inputs.host }}' '${{ inputs.tenant }}' '${{ inputs.app }}' '${{ inputs.image-ref }}'

name: plexus-changes

# Reusable change-detection (§ 8.2 PLX). Mounts the changed-apps verb on
# push/PR and emits the changed app set as a JSON array for a downstream matrix.
# Logic lives in scripts/changed-apps.sh, never here — this wrapper only plumbs
# event refs in and JSON out.

on:
  workflow_call:
    outputs:
      apps:
        description: JSON array of changed app dir names (e.g. ["website"], or []).
        value: ${{ jobs.detect.outputs.apps }}

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.run.outputs.apps }}
    steps:
      # The caller's repo (the tenant) — cwd for the verb, which reads apps/* +
      # git relative here. Full history so github.event.before is reachable.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # The verb itself lives in ci-cd; pin it to the exact workflow version.
      - uses: actions/checkout@v7
        with:
          repository: plexus-ms/ci-cd
          ref: ${{ github.job_workflow_sha }}
          path: .plexus-ci-src
      - uses: jdx/mise-action@v4
      - id: refs
        # PRs diff against the merge base; pushes against the previous tip.
        run: |
          if [ '${{ github.event_name }}' = 'pull_request' ]; then
            echo "from=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "from=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi
      - id: run
        # Verb prints one app per line; jq folds it to a compact JSON array
        # ([] when empty) for fromJSON in the caller's matrix.
        run: |
          apps=$(bash .plexus-ci-src/scripts/changed-apps.sh '${{ steps.refs.outputs.from }}' '${{ github.sha }}' | jq -R . | jq -sc .)
          echo "apps=$apps" >> "$GITHUB_OUTPUT"
